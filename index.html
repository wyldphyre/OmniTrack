<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OmniTrack">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" id="app-icon">
    <link rel="icon" type="image/png" id="favicon">
    <title>OmniTrack</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { background: #000; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100dvh;
            color: #fff;
            padding: 0 16px 130px;
            padding-top: max(16px, env(safe-area-inset-top));
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* Header */
        .app-header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 8px 0 20px;
        }

        .app-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .settings-btn {
            position: absolute;
            right: 0;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: rgba(255,255,255,0.55);
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .settings-btn:hover { color: #fff; }
        .settings-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* Cards */
        .omnibus-card {
            background: #1c1c1e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .omnibus-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .omnibus-title {
            font-size: 1.05rem;
            font-weight: 600;
            flex: 1;
            line-height: 1.3;
        }

        .omnibus-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            color: rgba(255,255,255,0.35);
            transition: color 0.2s;
            margin-top: -2px;
            margin-right: -4px;
        }

        .omnibus-menu-btn:hover { color: rgba(255,255,255,0.75); }
        .omnibus-menu-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }

        .omnibus-meta {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }

        /* Progress Bar */
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: #30d158;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-fill.child { background: rgba(48, 209, 88, 0.5); }

        /* Progress Controls */
        .progress-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .progress-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .progress-btn:active { background: rgba(255,255,255,0.22); }

        .progress-value {
            font-size: 1.35rem;
            font-weight: 700;
            min-width: 72px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Child Books */
        .child-books {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 12px;
        }

        .child-books-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 8px;
            user-select: none;
        }

        .child-books-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .collapse-chevron {
            color: rgba(255,255,255,0.3);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
        }

        .collapse-chevron svg { width: 14px; height: 14px; fill: currentColor; }
        .collapse-chevron.collapsed { transform: rotate(-90deg); }

        .child-books-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .child-books-content.collapsed { max-height: 0 !important; }

        .child-book {
            background: #2c2c2e;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .child-book:last-child { margin-bottom: 0; }

        .child-book-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .child-book-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .child-book-meta {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.38);
            margin-top: 2px;
        }

        .child-book-edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: rgba(255,255,255,0.28);
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .child-book-edit-btn:hover { color: rgba(255,255,255,0.65); }
        .child-book-edit-btn svg { width: 14px; height: 14px; fill: currentColor; display: block; }

        .child-progress-bar { height: 4px; }

        /* Bottom Toolbar */
        .bottom-toolbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            background: rgba(18,18,20,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px 20px 0 0;
            padding: 12px 20px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 100;
        }

        .toolbar-btn-import {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 12px;
            color: rgba(255,255,255,0.75);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .toolbar-btn-import:active { background: rgba(255,255,255,0.18); }
        .toolbar-btn-import svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

        .toolbar-btn-new {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 20px;
            background: #30d158;
            border: none;
            border-radius: 14px;
            color: #000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .toolbar-btn-new:active { opacity: 0.8; }
        .toolbar-btn-new svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

        /* Sheets */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .sheet-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 50%;
            width: 100%;
            max-width: 600px;
            background: #1c1c1e;
            border-radius: 20px 20px 0 0;
            padding: 0 20px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            max-height: 90dvh;
            overflow-y: auto;
            transform: translateX(-50%) translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 1001;
        }

        .sheet.visible { transform: translateX(-50%) translateY(0); }

        .sheet-handle-row {
            display: flex;
            justify-content: center;
            padding: 10px 0 4px;
            position: sticky;
            top: 0;
            background: #1c1c1e;
            cursor: grab;
            touch-action: none;
        }

        .sheet-handle-row:active { cursor: grabbing; }

        .sheet-handle {
            width: 36px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .sheet-title {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            padding: 12px 0 20px;
        }

        /* Forms */
        .form-group { margin-bottom: 14px; }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #2c2c2e;
            color: #fff;
            font-size: 1rem;
            -webkit-appearance: none;
        }

        .form-input:focus {
            outline: none;
            border-color: #30d158;
        }

        .form-input::placeholder { color: rgba(255,255,255,0.22); }

        /* Child Book Form */
        .child-book-form {
            background: #2c2c2e;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .child-book-form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .child-book-form-title {
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,0.38);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .child-book-form-remove {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.3);
            font-size: 1rem;
            padding: 2px 4px;
            transition: color 0.2s;
            line-height: 1;
        }

        .child-book-form-remove:hover { color: #ff453a; }

        .child-book-form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 8px;
        }

        @media (max-width: 480px) {
            .child-book-form-row { grid-template-columns: 1fr 1fr; }
            .child-book-form-row .form-group:first-child { grid-column: 1 / -1; }
        }

        .child-book-form-row .form-group { margin-bottom: 0; }

        .child-books-list { margin-bottom: 12px; }

        .add-child-btn {
            width: 100%;
            padding: 11px;
            border: 1.5px dashed rgba(255,255,255,0.16);
            background: transparent;
            color: rgba(255,255,255,0.4);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .add-child-btn:hover {
            border-color: rgba(255,255,255,0.32);
            color: rgba(255,255,255,0.75);
        }

        /* Form Actions */
        .form-actions {
            display: flex;
            gap: 10px;
            padding: 16px 0 4px;
        }

        .btn {
            flex: 1;
            padding: 13px 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }

        .btn:active { opacity: 0.7; }
        .btn-primary { background: #30d158; color: #000; }
        .btn-secondary { background: rgba(255,255,255,0.12); color: #fff; }
        .btn-danger { background: #ff453a; color: #fff; }

        /* Action Sheet Options */
        .action-sheet-options { padding: 4px 0 8px; }

        .action-sheet-btn {
            width: 100%;
            padding: 15px 16px;
            background: #2c2c2e;
            border: none;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: opacity 0.15s;
        }

        .action-sheet-btn:active { opacity: 0.7; }
        .action-sheet-btn.danger { color: #ff453a; }
        .action-sheet-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

        .action-sheet-cancel {
            width: 100%;
            padding: 15px;
            background: #2c2c2e;
            border: none;
            color: rgba(255,255,255,0.55);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            border-radius: 12px;
            margin-top: 4px;
            transition: opacity 0.15s;
        }

        .action-sheet-cancel:active { opacity: 0.7; }

        /* Confirm Sheet */
        .confirm-message {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.6);
            text-align: center;
            line-height: 1.5;
            padding-bottom: 20px;
        }

        /* Settings Sheet */
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #2c2c2e;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: none;
            width: 100%;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 400;
            transition: opacity 0.15s;
            text-align: left;
        }

        .settings-row:active { opacity: 0.7; }

        .settings-row-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-row-label svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
        .settings-row-danger { color: #ff453a; }

        .settings-row-chevron {
            width: 14px;
            height: 14px;
            fill: rgba(255,255,255,0.28);
            flex-shrink: 0;
        }

        .version-text {
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.78rem;
            margin-top: 20px;
            padding-bottom: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
        }

        .empty-state-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.28);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <h1>OmniTrack</h1>
            <button class="settings-btn" onclick="showSettingsSheet()" title="Settings">
                <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1s.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.06.74 1.69.99l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.99l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/></svg>
            </button>
        </div>
        <div id="omnibus-list"></div>
    </div>

    <!-- Bottom Toolbar -->
    <div class="bottom-toolbar">
        <button class="toolbar-btn-import" onclick="importOmnibusFile()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
            Import
        </button>
        <button class="toolbar-btn-new" onclick="showCreateSheet()">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            New Omnibus
        </button>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="import-omnibus-file" accept=".json" style="display:none" onchange="handleOmnibusImport(event)">
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

    <!-- Omnibus create/edit sheet -->
    <div class="sheet-overlay" id="omnibus-overlay" onclick="hideOmnibusSheet()"></div>
    <div class="sheet" id="omnibus-sheet">
        <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
        <div class="sheet-title" id="omnibus-sheet-title">New Omnibus</div>
        <form id="omnibus-form" onsubmit="saveOmnibus(event)">
            <input type="hidden" id="omnibus-id">
            <div class="form-group">
                <label class="form-label" for="omnibus-name">Name</label>
                <input type="text" class="form-input" id="omnibus-name" placeholder="e.g., The Lord of the Rings" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="omnibus-pages">Total Pages</label>
                <input type="number" class="form-input" id="omnibus-pages" placeholder="e.g., 1200" min="1" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="omnibus-percent">Percent Completed</label>
                <input type="number" class="form-input" id="omnibus-percent" placeholder="0" min="0" max="100" value="0">
            </div>
            <div class="form-group">
                <label class="form-label">Contains</label>
                <div id="child-books-form-list" class="child-books-list"></div>
                <button type="button" class="add-child-btn" onclick="addChildBookForm()">+ Add Book</button>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="hideOmnibusSheet()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <!-- Child book edit sheet -->
    <div class="sheet-overlay" id="child-overlay" onclick="hideChildSheet()"></div>
    <div class="sheet" id="child-sheet">
        <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
        <div class="sheet-title">Edit Book</div>
        <form id="child-form" onsubmit="saveChildBook(event)">
            <input type="hidden" id="child-omnibus-id">
            <input type="hidden" id="child-book-index">
            <div class="form-group">
                <label class="form-label" for="child-name">Name</label>
                <input type="text" class="form-input" id="child-name" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="child-series">Series Number</label>
                <input type="number" class="form-input" id="child-series" min="1" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="child-start">Start Page</label>
                <input type="number" class="form-input" id="child-start" min="1" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="hideChildSheet()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

    <!-- Confirm sheet -->
    <div class="sheet-overlay" id="confirm-overlay" onclick="hideConfirmSheet()"></div>
    <div class="sheet" id="confirm-sheet">
        <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
        <div class="sheet-title" id="confirm-title">Confirm</div>
        <p class="confirm-message" id="confirm-text"></p>
        <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="hideConfirmSheet()">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirm-btn" onclick="confirmAction()">Delete</button>
        </div>
    </div>

    <!-- Card action sheet -->
    <div class="sheet-overlay" id="actions-overlay" onclick="hideActionsSheet()"></div>
    <div class="sheet" id="actions-sheet">
        <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
        <div class="action-sheet-options">
            <button class="action-sheet-btn" onclick="editOmnibusFromActions()">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Edit
            </button>
            <button class="action-sheet-btn danger" onclick="deleteOmnibusFromActions()">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Delete
            </button>
        </div>
        <button class="action-sheet-cancel" onclick="hideActionsSheet()">Cancel</button>
    </div>

    <!-- Settings sheet -->
    <div class="sheet-overlay" id="settings-overlay" onclick="hideSettingsSheet()"></div>
    <div class="sheet" id="settings-sheet">
        <div class="sheet-handle-row"><div class="sheet-handle"></div></div>
        <div class="sheet-title">Settings</div>
        <button class="settings-row" onclick="exportData()">
            <span class="settings-row-label">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
                Export Data
            </span>
            <svg class="settings-row-chevron" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
        <button class="settings-row" onclick="importData()">
            <span class="settings-row-label">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                Import Data
            </span>
            <svg class="settings-row-chevron" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
        <button class="settings-row settings-row-danger" onclick="resetData()">
            <span class="settings-row-label">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Reset All Data
            </span>
            <svg class="settings-row-chevron" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
        <div class="version-text">Version 1.0.9</div>
    </div>

    <script>
        const STORAGE_KEY = 'omnitrack_data';
        const UI_STATE_KEY = 'omnitrack_ui_state';
        let omnibusBooks = [];
        let confirmCallback = null;
        let collapsedState = {};
        let activeOmnibusId = null;

        function loadUIState() {
            const data = localStorage.getItem(UI_STATE_KEY);
            if (data) collapsedState = JSON.parse(data);
        }

        function saveUIState() {
            localStorage.setItem(UI_STATE_KEY, JSON.stringify(collapsedState));
        }

        function toggleCollapse(id) {
            collapsedState[id] = !collapsedState[id];
            saveUIState();
            render();
        }

        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) omnibusBooks = JSON.parse(data);
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(omnibusBooks));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function calculatePagesRead(omnibus) {
            return Math.round((omnibus.percentCompleted / 100) * omnibus.pageCount);
        }

        function calculateChildBookProperties(omnibus) {
            const sortedBooks = [...omnibus.books].sort((a, b) => a.seriesNumber - b.seriesNumber);
            const pagesRead = calculatePagesRead(omnibus);
            return sortedBooks.map((book, index) => {
                const endPage = index === sortedBooks.length - 1
                    ? omnibus.pageCount
                    : sortedBooks[index + 1].startPage - 1;
                const totalPages = endPage - book.startPage + 1;
                const percentOfBook = (totalPages / omnibus.pageCount) * 100;
                let childPagesRead;
                if (pagesRead >= endPage) childPagesRead = totalPages;
                else if (pagesRead < book.startPage) childPagesRead = 0;
                else childPagesRead = pagesRead - book.startPage + 1;
                const percentRead = childPagesRead <= 0 ? 0 : (childPagesRead / totalPages) * 100;
                return { ...book, endPage, totalPages, percentOfBook, pagesRead: childPagesRead, percentRead };
            });
        }

        function render() {
            const container = document.getElementById('omnibus-list');
            if (omnibusBooks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-state-icon">📚</span>
                        <div class="empty-state-text">No omnibus books yet</div>
                        <div class="empty-state-subtext">Tap New Omnibus to get started</div>
                    </div>`;
                return;
            }
            container.innerHTML = omnibusBooks.map(omnibus => {
                const pagesRead = calculatePagesRead(omnibus);
                const childBooks = calculateChildBookProperties(omnibus);
                const chevronClass = collapsedState[omnibus.id] ? 'collapsed' : '';
                return `
                    <div class="omnibus-card">
                        <div class="omnibus-header">
                            <div class="omnibus-title">${escapeHtml(omnibus.name)}</div>
                            <button class="omnibus-menu-btn" onclick="showActionsSheet('${omnibus.id}')" title="More options">
                                <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                            </button>
                        </div>
                        <div class="omnibus-meta">${pagesRead.toLocaleString()} of ${omnibus.pageCount.toLocaleString()} pages</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${omnibus.percentCompleted}%"></div>
                        </div>
                        <div class="progress-controls">
                            <button class="progress-btn" onclick="adjustProgress('${omnibus.id}', -1)">−</button>
                            <div class="progress-value">${omnibus.percentCompleted}%</div>
                            <button class="progress-btn" onclick="adjustProgress('${omnibus.id}', 1)">+</button>
                        </div>
                        ${childBooks.length > 0 ? `
                            <div class="child-books">
                                <div class="child-books-header" onclick="toggleCollapse('${omnibus.id}')">
                                    <div class="child-books-title">Contains (${childBooks.length})</div>
                                    <span class="collapse-chevron ${chevronClass}">
                                        <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                                    </span>
                                </div>
                                <div class="child-books-content ${chevronClass}" style="max-height: ${childBooks.length * 90}px;">
                                ${childBooks.map((child, index) => `
                                    <div class="child-book">
                                        <div class="child-book-header">
                                            <div>
                                                <div class="child-book-name">${child.seriesNumber}. ${escapeHtml(child.name)}</div>
                                                <div class="child-book-meta">Pages ${child.startPage}–${child.endPage} · ${child.pagesRead}/${child.totalPages} read · ${Math.round(child.percentRead)}%</div>
                                            </div>
                                            <button class="child-book-edit-btn" onclick="editChildBook('${omnibus.id}', ${index})" title="Edit">
                                                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                            </button>
                                        </div>
                                        <div class="progress-bar child-progress-bar">
                                            <div class="progress-fill child" style="width: ${child.percentRead}%"></div>
                                        </div>
                                    </div>
                                `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function adjustProgress(id, increment) {
            const omnibus = omnibusBooks.find(o => o.id === id);
            if (omnibus) {
                omnibus.percentCompleted = Math.max(0, Math.min(100, omnibus.percentCompleted + increment));
                saveData();
                render();
            }
        }

        // Sheet helpers
        function showSheet(overlayId, sheetId) {
            document.getElementById(overlayId).classList.add('visible');
            document.getElementById(sheetId).classList.add('visible');
        }

        function hideSheet(overlayId, sheetId) {
            document.getElementById(overlayId).classList.remove('visible');
            document.getElementById(sheetId).classList.remove('visible');
        }

        // Omnibus sheet
        function showCreateSheet() {
            document.getElementById('omnibus-sheet-title').textContent = 'New Omnibus';
            document.getElementById('omnibus-id').value = '';
            document.getElementById('omnibus-name').value = '';
            document.getElementById('omnibus-pages').value = '';
            document.getElementById('omnibus-percent').value = '0';
            document.getElementById('child-books-form-list').innerHTML = '';
            showSheet('omnibus-overlay', 'omnibus-sheet');
            setTimeout(() => document.getElementById('omnibus-name').focus(), 350);
        }

        function hideOmnibusSheet() { hideSheet('omnibus-overlay', 'omnibus-sheet'); }

        // Actions sheet
        function showActionsSheet(id) {
            activeOmnibusId = id;
            showSheet('actions-overlay', 'actions-sheet');
        }

        function hideActionsSheet() {
            hideSheet('actions-overlay', 'actions-sheet');
            activeOmnibusId = null;
        }

        function editOmnibusFromActions() {
            const id = activeOmnibusId;
            hideActionsSheet();
            setTimeout(() => editOmnibus(id), 50);
        }

        function deleteOmnibusFromActions() {
            const id = activeOmnibusId;
            hideActionsSheet();
            setTimeout(() => deleteOmnibus(id), 50);
        }

        // Child sheet
        function hideChildSheet() { hideSheet('child-overlay', 'child-sheet'); }

        // Confirm sheet
        function hideConfirmSheet() {
            hideSheet('confirm-overlay', 'confirm-sheet');
            confirmCallback = null;
        }

        // Settings sheet
        function showSettingsSheet() { showSheet('settings-overlay', 'settings-sheet'); }
        function hideSettingsSheet() { hideSheet('settings-overlay', 'settings-sheet'); }

        function exportData() {
            const data = JSON.stringify(omnibusBooks, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.href = url;
            a.download = `omnitrack-export-${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importOmnibusFile() {
            document.getElementById('import-omnibus-file').click();
        }

        function handleOmnibusImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.omnibus_title || !data.total_pages || !Array.isArray(data.child_books)) {
                        alert('Invalid format. Expected omnibus_title, total_pages, and child_books.');
                        return;
                    }
                    omnibusBooks.push({
                        id: generateId(),
                        name: data.omnibus_title,
                        pageCount: data.total_pages,
                        percentCompleted: 0,
                        books: data.child_books.map((book, index) => ({
                            name: book.title,
                            seriesNumber: index + 1,
                            startPage: book.start_page
                        }))
                    });
                    saveData();
                    render();
                } catch (err) {
                    alert('Failed to parse file: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function importData() {
            document.getElementById('import-file').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        omnibusBooks = data;
                        saveData();
                        render();
                        hideSettingsSheet();
                    } else {
                        alert('Invalid data format. Expected an array of omnibus books.');
                    }
                } catch (err) {
                    alert('Failed to parse JSON file: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetData() {
            hideSettingsSheet();
            document.getElementById('confirm-title').textContent = 'Reset All Data';
            document.getElementById('confirm-text').textContent = 'Are you sure you want to delete all omnibus books? This cannot be undone.';
            document.getElementById('confirm-btn').textContent = 'Reset';
            confirmCallback = () => {
                omnibusBooks = [];
                saveData();
                render();
            };
            showSheet('confirm-overlay', 'confirm-sheet');
        }

        // Child book form
        let childFormCounter = 0;
        function addChildBookForm(name = '', seriesNumber = '', startPage = '') {
            const list = document.getElementById('child-books-form-list');
            const id = childFormCounter++;
            const div = document.createElement('div');
            div.className = 'child-book-form';
            div.id = `child-form-${id}`;
            div.innerHTML = `
                <div class="child-book-form-header">
                    <span class="child-book-form-title">Book</span>
                    <button type="button" class="child-book-form-remove" onclick="removeChildBookForm(${id})">✕</button>
                </div>
                <div class="child-book-form-row">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-input child-name" value="${escapeHtml(name)}" placeholder="Book name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Series #</label>
                        <input type="number" class="form-input child-series" value="${seriesNumber}" placeholder="#" min="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Start Page</label>
                        <input type="number" class="form-input child-start" value="${startPage}" placeholder="Page" min="1" required>
                    </div>
                </div>`;
            list.appendChild(div);
            div.querySelectorAll('.form-input').forEach(input => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') { e.preventDefault(); addChildBookForm(); }
                });
            });
            div.querySelector('.child-name').focus();
        }

        function removeChildBookForm(id) {
            document.getElementById(`child-form-${id}`)?.remove();
        }

        function saveOmnibus(event) {
            event.preventDefault();
            const id = document.getElementById('omnibus-id').value;
            const name = document.getElementById('omnibus-name').value.trim();
            const pageCount = parseInt(document.getElementById('omnibus-pages').value);
            const percentCompleted = parseInt(document.getElementById('omnibus-percent').value) || 0;
            const books = [];
            document.querySelectorAll('#child-books-form-list .child-book-form').forEach(form => {
                const childName = form.querySelector('.child-name').value.trim();
                const seriesNumber = parseInt(form.querySelector('.child-series').value);
                const startPage = parseInt(form.querySelector('.child-start').value);
                if (childName && seriesNumber && startPage) books.push({ name: childName, seriesNumber, startPage });
            });
            books.sort((a, b) => a.seriesNumber - b.seriesNumber);
            if (id) {
                const omnibus = omnibusBooks.find(o => o.id === id);
                if (omnibus) {
                    omnibus.name = name;
                    omnibus.pageCount = pageCount;
                    omnibus.percentCompleted = Math.max(0, Math.min(100, percentCompleted));
                    omnibus.books = books;
                }
            } else {
                omnibusBooks.push({ id: generateId(), name, pageCount, percentCompleted: Math.max(0, Math.min(100, percentCompleted)), books });
            }
            saveData();
            render();
            hideOmnibusSheet();
        }

        function editOmnibus(id) {
            const omnibus = omnibusBooks.find(o => o.id === id);
            if (!omnibus) return;
            document.getElementById('omnibus-sheet-title').textContent = 'Edit Omnibus';
            document.getElementById('omnibus-id').value = omnibus.id;
            document.getElementById('omnibus-name').value = omnibus.name;
            document.getElementById('omnibus-pages').value = omnibus.pageCount;
            document.getElementById('omnibus-percent').value = omnibus.percentCompleted;
            const list = document.getElementById('child-books-form-list');
            list.innerHTML = '';
            childFormCounter = 0;
            omnibus.books.forEach(book => addChildBookForm(book.name, book.seriesNumber, book.startPage));
            showSheet('omnibus-overlay', 'omnibus-sheet');
        }

        function deleteOmnibus(id) {
            const omnibus = omnibusBooks.find(o => o.id === id);
            if (!omnibus) return;
            document.getElementById('confirm-title').textContent = 'Delete Omnibus';
            document.getElementById('confirm-text').textContent = `Delete "${omnibus.name}" and all its books?`;
            document.getElementById('confirm-btn').textContent = 'Delete';
            confirmCallback = () => {
                omnibusBooks = omnibusBooks.filter(o => o.id !== id);
                saveData();
                render();
            };
            showSheet('confirm-overlay', 'confirm-sheet');
        }

        function editChildBook(omnibusId, childIndex) {
            const omnibus = omnibusBooks.find(o => o.id === omnibusId);
            if (!omnibus) return;
            const sortedBooks = [...omnibus.books].sort((a, b) => a.seriesNumber - b.seriesNumber);
            const child = sortedBooks[childIndex];
            if (!child) return;
            const actualIndex = omnibus.books.findIndex(b =>
                b.name === child.name && b.seriesNumber === child.seriesNumber && b.startPage === child.startPage
            );
            document.getElementById('child-omnibus-id').value = omnibusId;
            document.getElementById('child-book-index').value = actualIndex;
            document.getElementById('child-name').value = child.name;
            document.getElementById('child-series').value = child.seriesNumber;
            document.getElementById('child-start').value = child.startPage;
            showSheet('child-overlay', 'child-sheet');
        }

        function saveChildBook(event) {
            event.preventDefault();
            const omnibusId = document.getElementById('child-omnibus-id').value;
            const childIndex = parseInt(document.getElementById('child-book-index').value);
            const omnibus = omnibusBooks.find(o => o.id === omnibusId);
            if (!omnibus || childIndex < 0 || childIndex >= omnibus.books.length) return;
            omnibus.books[childIndex].name = document.getElementById('child-name').value.trim();
            omnibus.books[childIndex].seriesNumber = parseInt(document.getElementById('child-series').value);
            omnibus.books[childIndex].startPage = parseInt(document.getElementById('child-start').value);
            saveData();
            render();
            hideChildSheet();
        }

        function confirmAction() {
            if (confirmCallback) confirmCallback();
            hideConfirmSheet();
        }

        function generateAppIcon() {
            const SIZE = 180;
            const canvas = document.createElement('canvas');
            canvas.width = SIZE; canvas.height = SIZE;
            const ctx = canvas.getContext('2d');

            // Background (iOS rounds the corners automatically, but rounding here
            // keeps the favicon/browser tab look consistent with the home screen)
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.roundRect(0, 0, SIZE, SIZE, 40); ctx.fill();

            const TRACK = 'rgba(255,255,255,0.14)';
            const FILL = '#30d158';

            // Layout
            const barX = 26;
            const barW = SIZE - barX * 2;          // 128px
            const omniH = 18;
            const childH = 12;
            const childGap = 10;
            const omniGap = 22;
            const childCount = 4;
            const totalH = omniH + omniGap + childCount * childH + (childCount - 1) * childGap;
            const startY = (SIZE - totalH) / 2;

            // Child book progress values (0..1). These also drive the omnibus fill.
            const children = [1.0, 1.0, 0.62, 0.0];
            const omniProgress = children.reduce((a, b) => a + b, 0) / children.length;

            const drawBar = (x, y, w, h, progress) => {
                const r = h / 2;
                // Track
                ctx.fillStyle = TRACK;
                ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
                // Fill
                if (progress > 0) {
                    const fw = Math.max(h, w * progress); // keep fill at least as wide as height so the rounded cap renders cleanly
                    ctx.fillStyle = FILL;
                    ctx.beginPath(); ctx.roundRect(x, y, fw, h, r); ctx.fill();
                }
            };

            // Omnibus bar
            drawBar(barX, startY, barW, omniH, omniProgress);

            // Child bars
            let y = startY + omniH + omniGap;
            for (let i = 0; i < childCount; i++) {
                drawBar(barX, y, barW, childH, children[i]);
                y += childH + childGap;
            }

            const dataUrl = canvas.toDataURL('image/png');
            document.getElementById('app-icon').href = dataUrl;
            document.getElementById('favicon').href = dataUrl;
        }

        function initDraggableSheet(sheetId, hideFunc) {
            const sheet = document.getElementById(sheetId);
            const handle = sheet.querySelector('.sheet-handle-row');
            let startY = 0, dragY = 0, dragging = false;

            handle.addEventListener('pointerdown', (e) => {
                startY = e.clientY;
                dragY = 0;
                dragging = true;
                sheet.style.transition = 'none';
                handle.setPointerCapture(e.pointerId);
            });

            handle.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                dragY = Math.max(0, e.clientY - startY);
                sheet.style.transform = `translateX(-50%) translateY(${dragY}px)`;
            });

            handle.addEventListener('pointerup', () => {
                if (!dragging) return;
                dragging = false;
                if (dragY > 80) {
                    sheet.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
                    sheet.style.transform = 'translateX(-50%) translateY(100%)';
                    setTimeout(() => {
                        sheet.style.transition = '';
                        sheet.style.transform = '';
                        hideFunc();
                    }, 300);
                } else {
                    sheet.style.transition = 'transform 0.35s cubic-bezier(0.32, 0.72, 0, 1)';
                    sheet.style.transform = 'translateX(-50%) translateY(0)';
                    setTimeout(() => { sheet.style.transition = ''; sheet.style.transform = ''; }, 350);
                }
            });
        }

        // Initialize
        try { generateAppIcon(); } catch (e) { console.warn('Icon generation failed:', e); }
        loadData();
        loadUIState();
        render();

        initDraggableSheet('omnibus-sheet', hideOmnibusSheet);
        initDraggableSheet('child-sheet', hideChildSheet);
        initDraggableSheet('confirm-sheet', hideConfirmSheet);
        initDraggableSheet('actions-sheet', hideActionsSheet);
        initDraggableSheet('settings-sheet', hideSettingsSheet);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW registration failed:', e));
            navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
        }
    </script>
</body>
</html>
